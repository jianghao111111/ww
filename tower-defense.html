<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王国保卫战 - 塔防游戏</title>
    <link rel="stylesheet" href="tower-defense.css">
</head>
<body>
    <div class="game-container" id="game-container">
        <header class="game-header">
            <div class="header-left">
                <h1 class="game-title">🏰 王国保卫战</h1>
            </div>
            <div class="header-center">
                <div class="player-stats">
                    <div class="stat-item">
                        <span class="stat-icon">💰</span>
                        <span class="stat-label">金币</span>
                        <span class="stat-value" id="gold">150</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">❤️</span>
                        <span class="stat-label">生命</span>
                        <span class="stat-value" id="lives">20</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">🌊</span>
                        <span class="stat-label">波次</span>
                        <span class="stat-value" id="wave">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">⭐</span>
                        <span class="stat-label">得分</span>
                        <span class="stat-value" id="score">0</span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="fullscreen-btn" title="全屏">
                    <span class="icon" id="fullscreen-icon">⛶</span>
                </button>
            </div>
        </header>

        <div class="game-main">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
            </div>
            
            <aside class="side-panel">
                <div class="panel-section">
                    <h3 class="panel-title">🏗️ 防御塔</h3>
                    <div class="tower-grid" id="tower-grid"></div>
                </div>
                
                <div class="panel-section info-section">
                    <h3 class="panel-title">📋 信息</h3>
                    <div class="tower-info" id="tower-info">
                        <p>选择一个防御塔，然后点击地图放置</p>
                    </div>
                </div>
                
                <div class="panel-section upgrade-section" id="upgrade-section" style="display:none;">
                    <h3 class="panel-title">⬆️ 塔升级</h3>
                    <div class="upgrade-info" id="upgrade-info"></div>
                    <div class="upgrade-buttons">
                        <button class="control-btn upgrade-btn" id="upgrade-btn" style="display:none;">
                            <span class="btn-icon">⬆️</span>
                            <span class="btn-text">升级</span>
                        </button>
                        <button class="control-btn sell-btn" id="sell-btn" style="display:none;">
                            <span class="btn-icon">💰</span>
                            <span class="btn-text">出售</span>
                        </button>
                    </div>
                </div>
                
                <div class="panel-section control-section">
                    <h3 class="panel-title">🎮 控制</h3>
                    <div class="control-buttons">
                        <button class="control-btn primary" id="start-wave-btn">
                            <span class="btn-icon">▶️</span>
                            <span class="btn-text">开始波次</span>
                        </button>
                        <div class="control-row">
                            <button class="control-btn" id="fast-forward-btn" title="快进">
                                <span class="btn-icon">⏩</span>
                            </button>
                            <button class="control-btn" id="pause-btn" title="暂停">
                                <span class="btn-icon">⏸️</span>
                            </button>
                            <button class="control-btn" id="restart-btn" title="重新开始">
                                <span class="btn-icon">🔄</span>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay"></div>
    
    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">🏆</div>
            <h2 class="modal-title" id="modal-title">胜利！</h2>
            <p class="modal-text" id="modal-text">你成功保卫了王国！</p>
            <div class="modal-stats" id="modal-stats"></div>
            <button class="modal-btn" id="modal-restart-btn">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">再来一局</span>
            </button>
        </div>
    </div>

    <script src="tower-defense.js"></script>
</body>
</html>
